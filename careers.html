<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Careers | Gimeno Design Solutions</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Your CSS -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/responsive.css">

</head>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<body>

<section class="career-section">

    <div class="container">

        <a href="index.html" class="back-home">
            <i class="bi bi-arrow-left"></i>
            Back to Home
        </a>

        <div class="text-center mb-5">

            <h2>Join Our Team</h2>

            <p class="section-description">
                Build your career with Gimeno Design Solutions and become part of our growing team.
            </p>

        </div>

        <div class="row align-items-center g-5">

            <!-- LEFT -->

            <div class="col-lg-5">

                <form id="careerForm">


                    <div class="mb-3">

                        <input
                            type="text"
                            class="form-control"
                            name="name"
                            placeholder="Full Name"
                            required>

                    </div>

                    <div class="mb-3">

                        <input
                            type="email"
                            class="form-control"
                            name="email"
                            placeholder="Email Address"
                            required>

                    </div>

                    <div class="mb-3">

                        <select
                            class="form-select"
                            name="position"
                            required>

                            <option value="">Position Applying For</option>

                            <option>Website Developer</option>

                            <option>Graphic Designer</option>

                            <option>Mobile App Developer</option>

                        </select>

                    </div>

                    <div class="mb-3">

                        <label class="resume-label">

                            Upload Resume

                        </label>

                        <input
                            type="file"
                            class="form-control"
                            name="attachment"
                            accept=".pdf,.doc,.docx"
                            required>

                    </div>

                    <div class="mb-4">

                        <textarea
                            rows="6"
                            class="form-control"
                            name="message"
                            placeholder="Tell us about yourself..."
                            required></textarea>

                    </div>

                    <button
                        class="btn-primary-custom w-100"
                        type="submit">

                        Submit Application

                    </button>

                </form>

            </div>

            <!-- RIGHT -->

            <div class="col-lg-7">

                <img
                    src="assets/images/caree.png"
                    class="career-photo"
                    alt="Career">

            </div>

        </div>

    </div>

</section>

<script type="module" src="assets/js/careers.js"></script>

</body>
</html>
